; Uploads on this site are large by design - users dump whole camera rolls
; (mixed images and video) and albums of music into a single post, and an HD
; video file on its own can run to a couple of gigabytes. PHP's stock caps
; (2M/8M) reject those outright, before any code runs, and silently drop the
; file. PHP-FPM reads this file per-directory (there's no .htaccess php_value
; support under FPM). post_max_size is kept well above upload_max_filesize so a
; whole multi-file batch fits in one request, not just a single file; memory and
; time headroom cover large image processing and slow transfers. The setup
; environment check (EnvironmentChecker) flags these - and max_file_uploads,
; which is PHP_INI_SYSTEM and can only be raised in php.ini, not here - if they
; end up too low.
upload_max_filesize = 2G
post_max_size = 8G
memory_limit = 512M
max_execution_time = 600
max_input_time = 600
